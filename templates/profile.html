<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=820, user-scalable=yes">
    <title>员工人事信息档案</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Microsoft YaHei', '微软雅黑', sans-serif; background: #f0f2f5; min-height: 100vh; padding: 40px 0; }

        .form-container {
            width: 794px;
            min-width: 794px;
            background: #fff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-radius: 4px;
            padding: 40px;
            margin: 0 auto;
        }
        .form-main-title {
            text-align: center; font-size: 18px; font-weight: 700;
            color: #111; margin-bottom: 16px; letter-spacing: 2px;
        }

        table.ft {
            width: 100%; border-collapse: collapse; font-size: 12px;
            table-layout: fixed;
        }
        table.ft td {
            border: 1px solid #aaa;
            padding: 3px 4px;
            vertical-align: middle;
            word-break: break-all;
            overflow: hidden;
            height: 24px;
        }

        table.ft .lbl {
            background: #fafafa;
            color: #444;
            font-weight: 500;
            text-align: center;
            font-size: 10px;
        }

        table.ft .val {
            color: #222;
            font-size: 10px;
            background: #fff;
            text-align: left;
            padding-left: 6px;
        }

        table.ft .sec-hd td {
            background: #e8f0fe;
            color: #1a3a8f;
            font-weight: 600;
            font-size: 12px;
            padding: 5px 12px;
            border-color: #aab8e0;
            text-align: center;
        }

        .photo-cell {
            text-align: center; vertical-align: middle;
            color: #bbb; font-size: 11px;
            background: #fafafa; padding: 0 !important;
            position: relative;
        }
        .photo-cell .photo-img-wrap {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }
        .photo-cell .photo-img-wrap img {
            width: 100%; height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
        }
        .photo-placeholder {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100%; width: 100%; min-height: 120px; gap: 4px;
        }
        .photo-icon {
            width: 28px; height: 28px; border: 1.5px dashed #ccc;
            border-radius: 4px; display: flex; align-items: center; justify-content: center;
        }

        .loading { text-align: center; margin-top: 40px; font-size: 14px; color: #888; }
    </style>
</head>
<body>

<div class="form-container">
    <div class="form-main-title">员工人事信息档案</div>

    <div id="loading" class="loading">正在加载档案数据...</div>

    <div id="form-wrap" style="display: none;">
        <table class="ft" id="main-table">
            <colgroup id="grid-cols"></colgroup>
            <tbody id="form-body"></tbody>
        </table>
    </div>
</div>

<script>
    const FEISHU_USER_ID = "{{ id_card_no }}";
    const TOTAL_COLS = 24;

    document.addEventListener('DOMContentLoaded', async () => {
        const colgroup = document.getElementById('grid-cols');
        for (let i = 0; i < TOTAL_COLS; i++) {
            const col = document.createElement('col');
            col.style.width = (100 / TOTAL_COLS) + '%';
            colgroup.appendChild(col);
        }

        try {
            const response = await fetch(`/api/employee/${FEISHU_USER_ID}`);
            if (!response.ok) throw new Error("未找到员工记录");

            const result = await response.json();

            renderForm(result.data, result.layout);
            renderAppendix(result.appendixData, result.appendixLayout);

            document.getElementById('loading').style.display = 'none';
            document.getElementById('form-wrap').style.display = 'block';

        } catch (error) {
            document.getElementById('loading').innerHTML = `<span style="color:red">${error.message}</span>`;
        }
    });

    function isValid(val) {
        return val !== null && val !== undefined && val !== '' && val !== '—';
    }

    /**
     * 主表单渲染引擎
     *
     * 照片布局规则：
     *   1. 照片 rowSpan 固定 = photoField.minR，不随字段数量变化
     *   2. 照片旁（前 minR 行）：按正常流式格式排字段，排满 minR 行为止
     *      - 不足 minR 行：空白行补齐
     *      - 排满 minR 行后还有剩余字段：继续全宽正常排列
     *   3. 没有照片字段：全宽正常流式渲染
     */
    function renderForm(data, groups) {
        const tbody = document.getElementById('form-body');
        tbody.innerHTML = '';

        groups.forEach(group => {
            const activeFields = group.fields.filter(f => isValid(data[f.key]));
            if (activeFields.length === 0) return;

            // 渲染模块标题
            const secTr = document.createElement('tr');
            secTr.className = 'sec-hd';
            secTr.innerHTML = `<td colspan="${TOTAL_COLS}">${group.title}</td>`;
            tbody.appendChild(secTr);

            const photoField = activeFields.find(f => f.isPhoto);
            const nonPhotoFields = activeFields.filter(f => !f.isPhoto);

            if (!photoField) {
                // 无照片：全宽流式渲染
                splitFieldsIntoRows(nonPhotoFields, TOTAL_COLS).forEach(rowFields => {
                    const tr = document.createElement('tr');
                    appendFieldCells(tr, rowFields, TOTAL_COLS, data);
                    tbody.appendChild(tr);
                });
                return;
            }

            // ── 有照片 ──
            const photoMinR = photoField.minR;   // 照片固定行数
            const photoColW = photoField.vc;      // 照片列宽
            const sideColW  = TOTAL_COLS - photoColW; // 照片旁可用列宽

            // 照片旁：先把所有字段按 sideColW 分行
            const allSideRows = splitFieldsIntoRows(nonPhotoFields, sideColW);

            // 照片旁最多取 photoMinR 行，超出的留给全宽区
            const insideRows  = allSideRows.slice(0, photoMinR);
            const outsideRows = allSideRows.slice(photoMinR);

            // 渲染照片区（固定 photoMinR 行）
            for (let r = 0; r < photoMinR; r++) {
                const tr = document.createElement('tr');

                // 第一行插入照片单元格
                if (r === 0) {
                    const ptd = document.createElement('td');
                    ptd.className = 'photo-cell';
                    ptd.rowSpan = photoMinR;
                    ptd.colSpan = photoColW;
                    ptd.innerHTML = data[photoField.key]
                        ? `<div class="photo-img-wrap"><img src="${data[photoField.key]}"></div>`
                        : `<div class="photo-placeholder">
                               <div class="photo-icon">
                                   <svg viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5" style="width:16px;height:16px;">
                                       <rect x="3" y="5" width="18" height="14" rx="2"/>
                                       <circle cx="12" cy="12" r="3"/>
                                       <path d="M9 5l1.5-2h3L15 5"/>
                                   </svg>
                               </div>
                               <span style="transform:scale(0.9);">照片免冠</span>
                           </div>`;
                    tr.appendChild(ptd);
                }

                if (r < insideRows.length) {
                    // 有字段：正常排列
                    appendFieldCells(tr, insideRows[r], sideColW, data);
                } else {
                    // 不足：补空白行
                    const emptyTd = document.createElement('td');
                    emptyTd.className = 'val';
                    emptyTd.colSpan = sideColW;
                    emptyTd.textContent = '';
                    tr.appendChild(emptyTd);
                }

                tbody.appendChild(tr);
            }

            // 照片区结束后，超出的字段继续全宽排列
            outsideRows.forEach(rowFields => {
                const tr = document.createElement('tr');
                appendFieldCells(tr, rowFields, TOTAL_COLS, data);
                tbody.appendChild(tr);
            });
        });
    }

    /**
     * 将字段列表按可用列宽切分成多行
     * 每行字段的 (lc + vc) 之和不超过 availableCols
     * vc=0 的弹性字段当作 1 列计入（布局时再弹性补齐）
     */
    function splitFieldsIntoRows(fields, availableCols) {
        const rows = [];
        let currentRow = [];
        let usedCols = 0;

        fields.forEach(field => {
            const fieldWeight = (field.lc || 0) + (field.vc || 0) || 1;
            if (usedCols + fieldWeight > availableCols && currentRow.length > 0) {
                rows.push(currentRow);
                currentRow = [];
                usedCols = 0;
            }
            currentRow.push(field);
            usedCols += fieldWeight;
        });

        if (currentRow.length > 0) rows.push(currentRow);
        return rows;
    }

    /**
     * 向 tr 追加一行字段的单元格，弹性补齐到 availableCols
     */
    function appendFieldCells(tr, items, availableCols, data) {
        let fixedSum = 0;
        let autoCount = 0;
        items.forEach(it => {
            fixedSum += (it.lc || 0) + (it.vc || 0);
            if (!it.vc || it.vc === 0) autoCount++;
        });

        let leftover = availableCols - fixedSum;
        let baseAuto = autoCount > 0 ? Math.floor(leftover / autoCount) : 0;
        let remainderAuto = autoCount > 0 ? leftover % autoCount : 0;

        items.forEach((it, idx) => {
            // 标签
            if (it.lc > 0) {
                const tdL = document.createElement('td');
                tdL.className = 'lbl';
                tdL.colSpan = it.lc;
                tdL.textContent = it.label;
                tr.appendChild(tdL);
            }

            // 值
            const tdV = document.createElement('td');
            tdV.className = 'val';

            let finalVc = it.vc || 0;
            if (!it.vc || it.vc === 0) {
                finalVc = baseAuto + (remainderAuto > 0 ? 1 : 0);
                if (remainderAuto > 0) remainderAuto--;
            }

            // 最后一个格子把剩余列补满
            const isLast = (idx === items.length - 1);
            if (isLast && autoCount === 0 && leftover > 0) {
                finalVc += leftover;
            }

            tdV.colSpan = finalVc;
            tdV.textContent = data[it.key] || ' ';
            tr.appendChild(tdV);
        });
    }

    /**
     * 普通行渲染（无照片时使用）
     */
    function flushRow(tbody, items, available, data, _photoField, _photoRowStatus) {
        const tr = document.createElement('tr');
        appendFieldCells(tr, items, available, data);
        tbody.appendChild(tr);
    }

    /**
     * 附表渲染
     */
    function renderAppendix(appendixData, appendixLayout) {
        if (!appendixLayout) return;
        const tbody = document.getElementById('form-body');

        appendixLayout.forEach(config => {
            const tableData = appendixData[config.key] || [];
            if (tableData.length === 0) return;

            const titleRow = document.createElement('tr');
            titleRow.className = 'sec-hd';
            titleRow.innerHTML = `<td colspan="${TOTAL_COLS}">${config.title}</td>`;
            tbody.appendChild(titleRow);

            const headerRow = document.createElement('tr');
            config.columns.forEach(col => {
                const td = document.createElement('td');
                td.className = 'lbl';
                td.colSpan = col.colspan;
                td.textContent = col.label;
                headerRow.appendChild(td);
            });
            tbody.appendChild(headerRow);

            tableData.forEach(rowItem => {
                const tr = document.createElement('tr');
                config.columns.forEach(col => {
                    const td = document.createElement('td');
                    td.className = 'val';
                    td.colSpan = col.colspan;

                    let cellVal = rowItem[col.key];
                    if (col.key === 'is_highest') {
                        cellVal = cellVal == 1 ? '✓' : '';
                    }

                    td.textContent = cellVal ?? '';
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        });
    }
</script>

</body>
</html>
